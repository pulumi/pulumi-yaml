resources:
  siteBucket:
    type: aws:s3:Bucket
  testFileAsset:
    type: aws:s3:BucketObject
    properties:
      bucket: ${siteBucket.id}
      # Reference the s3.Bucket object
      source:
        fn::fileAsset: file.txt
  testStringAsset:
    type: aws:s3:BucketObject
    properties:
      bucket: ${siteBucket.id}
      # Reference the s3.Bucket object
      source:
        fn::stringAsset: <h1>File contents</h1>
  testRemoteAsset:
    type: aws:s3:BucketObject
    properties:
      bucket: ${siteBucket.id}
      # Reference the s3.Bucket object
      source:
        fn::remoteAsset: https://pulumi.test
  testFileArchive:
    type: aws:lambda:Function
    properties:
      role: ${siteBucket.arn}
      # Reference the s3.Bucket object
      code:
        fn::fileArchive: file.tar.gz
  testRemoteArchive:
    type: aws:lambda:Function
    properties:
      role: ${siteBucket.arn}
      # Reference the s3.Bucket object
      code:
        fn::remoteArchive: https://pulumi.test/foo.tar.gz
  testAssetArchive:
    type: aws:lambda:Function
    properties:
      role: ${siteBucket.arn}
      # Reference the s3.Bucket object
      code:
        fn::assetArchive:
          file.txt:
            fn::fileAsset: file.txt
          string.txt:
            fn::stringAsset: <h1>File contents</h1>
          remote.txt:
            fn::remoteAsset: https://pulumi.test
          file.tar:
            fn::fileArchive: file.tar.gz
          remote.tar:
            fn::remoteArchive: https://pulumi.test/foo.tar.gz
          .nestedDir:
            fn::assetArchive:
              file.txt:
                fn::fileAsset: file.txt
              string.txt:
                fn::stringAsset: <h1>File contents</h1>
              remote.txt:
                fn::remoteAsset: https://pulumi.test
              file.tar:
                fn::fileArchive: file.tar.gz
              remote.tar:
                fn::remoteArchive: https://pulumi.test/foo.tar.gz
