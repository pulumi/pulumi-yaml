name: Weekly release

on:
  schedule:
    # Mondays at 09:00 UTC.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  attempt-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PULUMI_BOT_TOKEN }}

      - name: Install changie
        uses: jaxxstorm/action-install-gh-release@v1.5.0
        with:
          repo: miniscruff/changie

      - name: Check for unreleased changes
        id: check
        run: |
          # `changie batch auto --dry-run` exits non-zero when there are no fragments;
          # `|| true` keeps the step alive so we can inspect the message.
          output=$(changie batch auto --dry-run 2>&1 || true)
          if [[ "$output" == *"no unreleased changes"* ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Batch unreleased changes
        if: steps.check.outputs.has-changes == 'true'
        run: changie batch auto

      - name: Merge into CHANGELOG.md
        if: steps.check.outputs.has-changes == 'true'
        run: changie merge

      - name: Get the new version
        if: steps.check.outputs.has-changes == 'true'
        id: latest
        run: echo "output=$(changie latest)" >> "$GITHUB_OUTPUT"

      - name: Open release PR
        if: steps.check.outputs.has-changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PULUMI_BOT_TOKEN }}
          VERSION: ${{ steps.latest.outputs.output }}
        run: |
          set -euo pipefail
          BRANCH="automation/release-${VERSION}"

          git config user.name "pulumi-bot"
          git config user.email "bot@pulumi.com"
          git checkout -b "$BRANCH"
          git add .changes CHANGELOG.md
          git commit -m "Changelog for ${VERSION}"
          git push --force --set-upstream origin "$BRANCH"

          # If a PR is already open for this branch, the force-push above refreshed it; reuse its URL.
          existing=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url')
          if [ -n "$existing" ]; then
            echo "PR already open: ${existing}; refreshed the branch."
            echo "url=${existing}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > /tmp/pr-body.md <<'BODY'
          Automated release PR generated by `.github/workflows/attempt-release.yml`.

          ## What happens on merge

          Pushing this changelog change to `main` triggers `.github/workflows/release.yml`, which:

          - creates the `__VERSION__` git tag
          - publishes the GitHub release with notes from `.changes/__VERSION__.md`
          - builds and uploads binaries (`pulumi-language-yaml`, `pulumi-converter-yaml`) for `{darwin, linux, windows} × {amd64, arm64}`

          ## Follow-up

          After merge, bump the version in [`pulumi/pulumi/scripts/get-language-providers.sh`](https://github.com/pulumi/pulumi/blob/master/scripts/get-language-providers.sh#L35).
          BODY
          sed -i "s|__VERSION__|${VERSION}|g" /tmp/pr-body.md

          pr_url=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Changelog for ${VERSION}" \
            --body-file /tmp/pr-body.md)
          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: steps.pr.outputs.url != ''
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.RELEASE_BOT_TOKEN }}
          payload: |
            channel: "#team-iac-core"
            text: "`pulumi-yaml` ${{ steps.latest.outputs.output }} release is ready to go! ${{ steps.pr.outputs.url }}"
