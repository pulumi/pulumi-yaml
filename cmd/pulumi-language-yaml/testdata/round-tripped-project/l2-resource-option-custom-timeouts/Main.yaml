resources:
  noTimeouts:
    type: simple:Resource
    properties:
      value: true
  createOnly:
    type: simple:Resource
    properties:
      value: true
    options:
      customTimeouts:
        create: 5m
  updateOnly:
    type: simple:Resource
    properties:
      value: true
    options:
      customTimeouts:
        update: 10m
  deleteOnly:
    type: simple:Resource
    properties:
      value: true
    options:
      customTimeouts:
        delete: 3m
  allTimeouts:
    type: simple:Resource
    properties:
      value: true
    options:
      customTimeouts:
        create: 2m
        update: 4m
        delete: 1m
