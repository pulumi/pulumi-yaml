resources:
  receiverIgnore:
    type: nestedobject:Receiver
    properties:
      details:
        - key: a
          value: b
    options:
      ignoreChanges:
        - details[0].key
  mapIgnore:
    type: nestedobject:MapContainer
    properties:
      tags:
        env: prod
    options:
      ignoreChanges:
        - tags["env"]
        - tags["with.dot"]
        - tags["with escaped \""]
  noIgnore:
    type: nestedobject:Target
    properties:
      name: nothing
