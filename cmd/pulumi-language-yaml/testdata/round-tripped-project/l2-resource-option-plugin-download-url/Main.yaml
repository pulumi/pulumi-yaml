resources:
  withDefaultUrl:
    type: simple:Resource
    name: withDefaultURL
    properties:
      value: true
  withExplicitDefaultUrl:
    type: simple:Resource
    name: withExplicitDefaultURL
    properties:
      value: true
    options:
      pluginDownloadURL: https://github.com/pulumi/pulumi-simple/releases/v$${VERSION}
  withCustomUrl1:
    type: simple:Resource
    name: withCustomURL1
    properties:
      value: true
    options:
      pluginDownloadURL: https://custom.pulumi.test/provider1
  withCustomUrl2:
    type: simple:Resource
    name: withCustomURL2
    properties:
      value: false
    options:
      pluginDownloadURL: https://custom.pulumi.test/provider2
