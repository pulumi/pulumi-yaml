resources:
  parent:
    type: simple:Resource
    properties:
      value: true
  aliasUrn:
    type: simple:Resource
    name: aliasURN
    properties:
      value: true
    options:
      parent: ${parent}
      aliases:
        - urn:pulumi:test::l2-resource-option-alias::simple:index:Resource::aliasURN
  aliasNewName:
    type: simple:Resource
    properties:
      value: true
    options:
      aliases:
        - name: aliasName
  aliasNoParent:
    type: simple:Resource
    properties:
      value: true
    options:
      parent: ${parent}
      aliases:
        - noParent: true
  aliasParent:
    type: simple:Resource
    properties:
      value: true
    options:
      parent: ${parent}
      aliases:
        - parent: ${aliasUrn}
  aliasType:
    type: simple:Resource
    properties:
      value: true
    options:
      aliases:
        - type: component:index:Custom
