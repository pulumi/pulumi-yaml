resources:
  # Stage 1: Change properties to trigger replacements

  # // Scenario 1: Change replaceProp → REPLACE (schema triggers)
  schemaReplace:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      replaceProp: false
  # Scenario 2: Change value → REPLACE (option triggers)
  optionReplace:
    type: replaceonchanges:ResourceB
    properties:
      value: false
    options:
      replaceOnChanges:
        - value
  # Scenario 3: Change value → REPLACE (option on value triggers)
  bothReplaceValue:
    type: replaceonchanges:ResourceA
    properties:
      value: false
      # Changed from true
      replaceProp: true
    options:
      replaceOnChanges:
        - value
  # Scenario 4: Change replaceProp → REPLACE (schema on replaceProp triggers)
  bothReplaceProp:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      # Unchanged
      replaceProp: false
    options:
      replaceOnChanges:
        - value
  # Scenario 5: Change value → UPDATE (no replaceOnChanges)
  regularUpdate:
    type: replaceonchanges:ResourceB
    properties:
      value: false
  # Scenario 6: No change → SAME (no operation)
  noChange:
    type: replaceonchanges:ResourceB
    properties:
      value: true
    options:
      replaceOnChanges:
        - value
  # Scenario 7: Change replaceProp (not value) → UPDATE (marked property unchanged)
  wrongPropChange:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      # Unchanged (this is marked for replacement)
      replaceProp: false
    options:
      replaceOnChanges:
        - value
  # Scenario 8: Change value → REPLACE (multiple properties marked)
  multiplePropReplace:
    type: replaceonchanges:ResourceA
    properties:
      value: false
      # Changed from true
      replaceProp: true
    options:
      replaceOnChanges:
        - value
        - replaceProp
