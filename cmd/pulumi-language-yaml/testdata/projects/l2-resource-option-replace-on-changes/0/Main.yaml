resources:
  # Stage 0: Initial resource creation

  # // Scenario 1: Schema-based replaceOnChanges on replaceProp
  schemaReplace:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      replaceProp: true
  # Scenario 2: Option-based replaceOnChanges on value
  optionReplace:
    type: replaceonchanges:ResourceB
    properties:
      value: true
    options:
      replaceOnChanges:
        - value
  # Scenario 3: Both schema and option - will change value
  bothReplaceValue:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      replaceProp: true
    options:
      replaceOnChanges:
        - value
  # Scenario 4: Both schema and option - will change replaceProp
  bothReplaceProp:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      replaceProp: true
    options:
      replaceOnChanges:
        - value
  # Scenario 5: No replaceOnChanges - baseline update
  regularUpdate:
    type: replaceonchanges:ResourceB
    properties:
      value: true
  # Scenario 6: replaceOnChanges set but no change
  noChange:
    type: replaceonchanges:ResourceB
    properties:
      value: true
    options:
      replaceOnChanges:
        - value
  # Scenario 7: replaceOnChanges on value, but only replaceProp changes
  wrongPropChange:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      replaceProp: true
    options:
      replaceOnChanges:
        - value
  # Scenario 8: Multiple properties in replaceOnChanges array
  multiplePropReplace:
    type: replaceonchanges:ResourceA
    properties:
      value: true
      replaceProp: true
    options:
      replaceOnChanges:
        - value
        - replaceProp
