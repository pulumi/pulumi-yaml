resources:
  provider:
    type: pulumi:providers:simple
  parent1:
    type: simple:Resource
    properties:
      value: true
    options:
      provider: ${provider}
  # This should inherit the explicit provider from parent1
  child1:
    type: simple:Resource
    properties:
      value: true
    options:
      parent: ${parent1}
  parent2:
    type: primitive:Resource
    properties:
      boolean: false
      float: 0
      integer: 0
      string: ""
      numberArray: []
      booleanMap: {}
  # This _should not_ inherit the provider from parent2 as it is a default provider.
  child2:
    type: simple:Resource
    properties:
      value: true
    options:
      parent: ${parent2}
  # This _should not_ inherit the provider from parent1 as its from the wrong package.
  child3:
    type: primitive:Resource
    properties:
      boolean: false
      float: 0
      integer: 0
      string: ""
      numberArray: []
      booleanMap: {}
    options:
      parent: ${parent1}
