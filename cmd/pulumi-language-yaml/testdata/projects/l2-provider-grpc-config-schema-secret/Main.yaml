resources:
  # This provider covers scenarios where configuration properties are marked as secret in the schema.
  config_grpc_provider:
    type: pulumi:providers:config-grpc
    properties:
      secretString1: SECRET
      secretInt1: 16
      secretNum1: 123456.789
      secretBool1: true
      listSecretString1:
        - SECRET
        - SECRET2
      mapSecretString1:
        key1: SECRET
        key2: SECRET2
      objSecretString1:
        secretX: SECRET
  config:
    type: config-grpc:ConfigFetcher
    options:
      provider: ${config_grpc_provider}
